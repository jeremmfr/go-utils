name: GolangCI-Lint
on: [push, pull_request]
permissions:
  contents: read
jobs:
  run:
    name: Run
    runs-on: ubuntu-latest
    steps:
      - name: Set up Go
        uses: actions/setup-go@v6
        with:
          go-version: '1.26'
        id: go
      - name: Check out code
        uses: actions/checkout@v7
      - name: golangci-lint
        uses: golangci/golangci-lint-action@v9
        with:
          version: v2.11.4
          args: -c .golangci.yml -v
